<!DOCTYPE html>
<html>
<head>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  .parallax-container {
    height: 100vh; 
    width: 100%;

    background-image: url('smiling-cat-for-web.jpg');
    background-attachment: fixed;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
  }

  .content {
    height: 1000px;
    background-color: transparent;
    padding: 50px;
    font-size: 24px;
  }
</style>
</head>
<body>
    <div class="parallax-container">
        <div >
            <h1>Parallax Scrolling Effect</h1>
            <p style = "font-size: xx-large;"> bananananananananananananananananananananan </p>
        </div>

        <div >
            <h1>Now it takes up the whole screen!</h1>
            <p>Scroll down to see the content slide over the fixed image.</p>
        </div>
    </div>
  

</body>
</html>
