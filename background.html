<!DOCTYPE html>
<html>
<head>
<style>
  /* Reset margins so the image touches the very edge of the screen */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  .parallax-container {
    /* Set to 100% of the Viewport Height */
    height: 100vh; 
    width: 100%;

    /* The actual Parallax Magic */
    background-image: url('smiling-cat-for-web.jpg');
    background-attachment: fixed; /* Keeps image from moving */
    background-position: center;  /* Centers the image */
    background-repeat: no-repeat; /* Prevents tiling */
    background-size: cover;       /* Forces image to fill the area */
  }

  .content {
    height: 1000px; /* Extra height to allow scrolling */
    background-color: transparent;
    padding: 50px;
    font-size: 24px;
  }
</style>
</head>
<body>
    <div class="parallax-container">
        <div >
            <h1>Parallax Scrolling Effect</h1>
            <p style = "font-size: xx-large;"> bananananananananananananananananananananan </p>
            <!-- You can put a title here if you want it over the image -->
        </div>

        <div >
            <h1>Now it takes up the whole screen!</h1>
            <p>Scroll down to see the content slide over the fixed image.</p>
        </div>
    </div>
  

</body>
</html>
