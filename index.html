<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Carpets</title>
</head>
<body>
    <div id = "start page">
    <h1 style="text-align: center; font-size:80px">  
        How depressed are you rn?
    </h1>
    <div class="quiz">
        <h2>
            <style>
                .quiz
                {
                    display: flex;           
                    flex-direction: column;    
                    align-items: center;      
                     

                    gap: 1px;
                }
                button
                {
                    color: black;
                    width: 500px;
                    height: 200px;
                    font-size: 65px;
                    border-radius: 40px;

                    transition: all 0.2s ease; 
                }
            </style>
        </h2>
        <div>
            <button style = "background-color: pink;"
            onclick="alert('You are very depressed!')">Very</button>

            <button style = "background-color: lightblue;margin-top: 5px" 
            onclick="alert('You are somewhat depressed!')">Somewhat</button>
        </div>
        
        <div>
            <button style = "background-color: rgb(241, 163, 220);"
            onclick="alert('You are somewhat depressed!')">idk</button >

            <button style = "background-color: rgb(132, 153, 246);margin-top: 5px"
            onclick="alert('You are not depressed at all!')">Not at all</button>
        </div>
        
    </div>         
</body>
</html>
